name: Seal NPM_TOKEN for fleet sync

# Encrypt secrets.NPM_TOKEN for local fleet propagation.
# Used by: sync-fleet-npm-token (on the operator machine).
#
# Flow: caller supplies RSA public key → workflow AES-encrypts the token,
# RSA-OAEP-wraps the AES key → artifact. Caller decrypts and runs
# `gh secret set NPM_TOKEN` on every fleet repo. Never prints the token.

on:
  workflow_dispatch:
    inputs:
      pubkey_pem_b64:
        description: "Base64 of RSA public key PEM (no newlines)"
        required: true

permissions:
  contents: read

jobs:
  seal:
    runs-on: ubuntu-latest
    steps:
      - name: Seal NPM_TOKEN
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PUBKEY_B64: ${{ inputs.pubkey_pem_b64 }}
        run: |
          set -euo pipefail
          if [[ -z "${NPM_TOKEN:-}" ]]; then
            echo "::error::NPM_TOKEN secret is empty on agentic-sage"
            exit 1
          fi
          mkdir -p sealed
          printf '%s' "$PUBKEY_B64" | base64 -d > pubkey.pem
          openssl rand -out aes.key 32
          openssl rand -out aes.iv 16
          KEY_HEX=$(xxd -p -c 32 aes.key | tr -d '\n')
          IV_HEX=$(xxd -p -c 16 aes.iv | tr -d '\n')
          # Raw AES-256-CBC (key+iv), no passphrase
          printf '%s' "$NPM_TOKEN" | openssl enc -aes-256-cbc -nosalt \
            -K "$KEY_HEX" -iv "$IV_HEX" -out sealed/token.enc
          openssl pkeyutl -encrypt -pubin -inkey pubkey.pem \
            -pkeyopt rsa_padding_mode:oaep \
            -in aes.key -out sealed/aes.key.enc
          cp aes.iv sealed/aes.iv
          shred -u aes.key 2>/dev/null || rm -f aes.key
          rm -f pubkey.pem
          ls -la sealed/

      - name: Upload sealed bundle
        uses: actions/upload-artifact@v4
        with:
          name: npm-token-sealed
          path: sealed/
          retention-days: 1
