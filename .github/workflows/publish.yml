name: Publish to npm

# release-please prepares the release PR + CHANGELOG + version tag. Tags look like
# `agentic-sage-vX.Y.Z` (component-in-tag). A tag auto-pushed by release-please's
# default GITHUB_TOKEN does NOT chain-trigger other workflows — so after merging the
# release PR, either:
#   1. Run this workflow manually (Actions → Publish to npm → Run workflow), or
#   2. Push a human-created tag that matches the patterns below.
# Full auto: give release-please a PAT/GitHub-App token with contents:write so its
# tag push is treated as a real user event.
on:
  push:
    tags:
      - 'v*'
      - 'agentic-sage-v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for --provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
